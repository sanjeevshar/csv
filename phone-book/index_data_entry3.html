<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Data Entry Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Student Data Entry Form</h1>
        <form id="dataForm">
            <div class="form-group">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" pattern="[A-Za-z ]+" required placeholder="यहाँ नाम लिखें">
                <title>Please enter only letters and spaces.</title>
            </div>
            <div class="form-group">
                <label for="phone">Mobile Number:</label>
                <input type="tel" id="phone" name="phone" pattern="[9876][0-9]{9}" required placeholder="यहाँ मोबाइल नंबर लिखें">
                <title>कृपया ठीक 10 अंक लिखें, जो 9, 8, 7, या 6 से शुरू हों।</title>
            </div>
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="यहाँ ईमेल लिखें">
            </div>
            <div class="form-group">
              <label for="class"> class</label>
              <input type="number" id="class" name="class" min="6" max="12" placeholder="Enter class 6th to 12th">
            </div>
            <div class="form-group">
                <label for="school">School:</label>
                <select id="school" name="school">
                    <option value="none">-- Select School --</option>                            
                    <option value="govt-school">Govt. School</option>
                    <option value="kps">Kerala Public School</option>
                    <option value="wisdom">Wisdom World</option>
                    <option value="pks">pushpa kanya school</option>                           
                    <option value="jnv">jawahar navodaya vidyalaya naichana</option>
                    <option value="vbhs">vishav bharti high school</option>
                    <option value="pmsgsss">pm shri govt high school</option>
                    <option value="rksps">rao kanwar sain public school</option>
                    <option value="vnps">vidya niketan public school</option>
                    <option value="sis">sunglow international school</option>
                    <option value="blsns">bl siksha niketan school</option>
                    <option value="ssr">suraj school rewari</option>
                    <option value="bpps">baal phulwari play school</option>
                    <option value="ssr">suraj school rewari</option>
                    </select>
            </div>
            <div class="form-group">
                <label for="save data to">Save Data To:</label>
                <select id="save data to" name="target_file">
                    <option value="phone_book2.csv">SUBHAM FILE (phone_book2.csv)</option>
                    <option value="phone_book1.csv">NIKHIL FILE (phone_book1.csv)</option>
                </select>
            </div>            
            <button type="submit">Submit Data</button>
        </form>
        <div id="responseMessage" class="message"></div>
    </div>
    <script src="connect.js"></script>
</body>
</html>
