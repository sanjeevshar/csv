<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSV Search</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Search Directory</h1>
        <form id="searchForm">
            <input type="hidden" id="phoneBookName" name="phoneBookName" value="phone_book2.csv">
            <div class="form-group">
                <label for="searchName">Enter Name:</label>
                <input type="text" id="searchName" name="name" placeholder="Type a name to search..." required>
            </div>
            <button type="submit">Search</button>
        </form>
        <div id="responseMessage" class="message"></div>
    </div>
    <script src="search.js"></script>
</body>
</html>
