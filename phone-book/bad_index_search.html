<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Data Search Form</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h2>Search Entry Form</h2>
        <form id="searchForm">
            <div class="form-group">
                <label for="sname">Name नाम:</label>
                <input type="text" id="sname" name="name" pattern="[a-zA-Z\s]+" required>
            </div>
            <div class="form-group">
                <label for="sphone">Mobile Number मोबाइल नंबर:</label>
                <input type="tel" id="sphone" name="phone" pattern="[0-9]{10}" 
                title="Please enter exactly 10 digits">

            </div>
            <div class="form-group">
                <label for="semail">Email ईमेल:</label>
                <input type="email" id="semail" name="email">
            </div>

            <button type="submit">Search Data</button>
        </form>
        <div id="searchResponseMessage" class="message"></div>
    </div>
    <script src="connect.js"></script>
</body>
</html>
