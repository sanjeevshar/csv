
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Display CSV with JavaScript</title>
  <style>
    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 20px;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 8px;
    }
  </style>
</head>
<body>
  <h2>Contents of qbank1.csv</h2>
  <div id="output"></div>

  <script>
    fetch('./qbank1.csv')
      .then(response => response.text())
      .then(data => {
        const rows = data.trim().split('\n').map(row => row.split(','));
        const header = rows[0];
        const filteredRows = rows.slice(1).filter(row => {
          const value = parseFloat(row[0]);
          return value == '201';
        });
        let html = '<table>';
        rows.forEach((row, i) => {
          html += '<tr>';
          row.forEach(cell => {
            html += i === 0 ? `<th>${cell.trim()}</th>` : `<td>${cell.trim()}</td>`;
          });
          html += '</tr>';
        });
        html += '</table>';
        document.getElementById('output').innerHTML = html;
      })
        
      .catch(error => {
        document.getElementById('output').innerHTML = `<p>Error loading CSV: ${error}</p>`;
      });

      let html = '<table><thead><tr>';
      rows.forEach(row => {
        html += '<tr>';
        row.forEach(cell => html += `<td>${cell.trim()}</td>`);
        html += '</tr>';
      });

      html += '</table>';
      document.getElementById('output').innerHTML = html;

  </script>
</body>
</html>
