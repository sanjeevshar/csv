<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Data Entry Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Shop Data Entry Form</h1>
        <form id="dataForm">
            <div class="form-group">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" pattern="[A-Za-z ]+" required placeholder="यहाँ नाम लिखें">
                <title>Please enter only letters and spaces.</title>
            </div>
            <div class="form-group">
                <label for="phone">Mobile Number:</label>
                <input type="tel" id="phone" name="phone" pattern="[9876][0-9]{9}" placeholder="यहाँ मोबाइल नंबर लिखें">
                <title>कृपया ठीक 10 अंक लिखें, जो 9, 8, 7, या 6 से शुरू हों।</title>
            </div>
             <div class="form-group">
                <label for="amount">Payment Amount (₹):</label>
                <input type="number" id="amount" name="amount" min="10" max="1500" step="10" required placeholder="10 se 1500 tak likhen">
                <title>Kripya 10 se 1500 ke beech ka amount bharen.</title>
            </div>
             <div class="form-group">
                <label for="payment-type">payment type:</label>
                <select id="payment-type" name="payment-type">
                    <option value="cash">Cash</option>
                    <option value="upi">UPI</option>
                    <option value="bank-transfer">Bank Transfer</option>
                    <option value="udhaar">Udhaar</option>
                </select>
            </div>               
          <input type="hidden" id="dataFile" name="dataFile" value="shop_sales.csv">
            <button type="submit">Submit Data</button>
        </form>
        <div id="responseMessage" class="message"></div>
    </div>
    <script src="connect.js"></script>
</body>
</html>
