<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Entry Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Data Entry Form</h1>
        <form id="dataForm">
            <div class="form-group">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="phone">Mobile Number:</label>
                <input type="tel" id="phone" name="phone" pattern="[0-9]{10}" 
                title="Please enter exactly 10 digits">

            </div>
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email">
            </div>

            <button type="submit">Submit Data</button>
        </form>
        <div id="responseMessage" class="message"></div>
    </div>

    <script>
        document.getElementById('dataForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            const data = Object.fromEntries(formData);
            const msgEl = document.getElementById('responseMessage');
            
            try {
                const response = await fetch('http://192.168.0.23:5050/submit', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    msgEl.className = 'message success';
                    msgEl.textContent = 'Data saved successfully!';
                    this.reset();
                } else {
                    msgEl.className = 'message error';
                    msgEl.textContent = 'Error: ' + result.message;
                }
                msgEl.style.display = 'block';
                
            } catch (error) {
                msgEl.className = 'message error';
                msgEl.textContent = 'Connection error: ' + error.message;
                msgEl.style.display = 'block';
            }
        });
    </script>
</body>
</html>
